server {
    listen 80;
    server_name localhost;

    # Laravel public directory
    root /var/www/public;
    index index.php index.html;

    # ── Charset & max upload size ──────────────────────────────────────────────
    charset utf-8;
    client_max_body_size 20M;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ── Main routing — passes everything to Laravel's front controller ─────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM passthrough ────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # 'app' matches the docker-compose service name
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Timeouts
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
    }

    # ── API routes — no caching ────────────────────────────────────────────────
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Storage symlink ────────────────────────────────────────────────────────
    location /storage {
        try_files $uri $uri/ =404;
        access_log off;
    }

    # ── Block dot-files ────────────────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    error_log  /var/log/nginx/petmarket_error.log;
    access_log /var/log/nginx/petmarket_access.log;
}
