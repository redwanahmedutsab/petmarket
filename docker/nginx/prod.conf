# ─────────────────────────────────────────────────────────────────────────────
# Nginx Production Configuration — Pet Marketplace API
# Replace YOUR_DOMAIN with your actual domain
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m  rate=120r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.petmarketplace.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS API server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.petmarketplace.com;

    root /var/www/public;
    index index.php;
    charset utf-8;

    # ── SSL ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.petmarketplace.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.petmarketplace.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Upload size ───────────────────────────────────────────────────────────
    client_max_body_size 25M;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # ── Auth endpoints — strict rate limit ────────────────────────────────────
    location ~ ^/api/auth/(login|register|forgot-password) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.php?$query_string;

        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_read_timeout 60;
    }

    # ── General API routes ────────────────────────────────────────────────────
    location /api {
        limit_req zone=api burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
        add_header Cache-Control "no-store, no-cache" always;
    }

    # ── Laravel routing ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM passthrough ───────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 60;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 60;
    }

    # ── Static files ──────────────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Storage ───────────────────────────────────────────────────────────────
    location /storage {
        try_files $uri $uri/ =404;
        access_log off;
    }

    # ── Block dot-files and sensitive paths ───────────────────────────────────
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    error_log  /var/log/nginx/api_error.log warn;
    access_log /var/log/nginx/api_access.log combined buffer=16k;
}
