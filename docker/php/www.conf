; ─────────────────────────────────────────────────────────────────────────────
; PHP-FPM Production Pool Configuration
; ─────────────────────────────────────────────────────────────────────────────

[www]
user = www-data
group = www-data

; Use TCP socket (better for Docker networking)
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data

; ── Process management ────────────────────────────────────────────────────────
; dynamic: scales between pm.min_spare_servers and pm.max_children
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; ── Timeouts ─────────────────────────────────────────────────────────────────
request_terminate_timeout = 60s

; ── Logging ──────────────────────────────────────────────────────────────────
access.log = /dev/null
slowlog = /var/log/php-fpm-slow.log
request_slowlog_timeout = 10s

; ── Environment ──────────────────────────────────────────────────────────────
clear_env = no
catch_workers_output = yes
