services:

  # ── Laravel PHP-FPM ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petmarket_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./src/storage:/var/www/storage   # persist storage across rebuilds
    environment:
      - PHP_OPCACHE_ENABLE=0             # disabled in dev for hot reload
    networks:
      - petmarket_network
    depends_on:
      postgres:
        condition: service_healthy

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: petmarket_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - petmarket_network
    depends_on:
      - app

  # ── PostgreSQL 17 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: petmarket_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pet_marketplace
      POSTGRES_USER: petmarket
      POSTGRES_PASSWORD: petmarket123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - petmarket_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petmarket -d pet_marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin 4 ─────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: petmarket_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@petmarket.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - petmarket_network
    depends_on:
      - postgres

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: petmarket_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules              # anonymous volume prevents host override
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_APP_NAME=Pet Marketplace
    command: sh -c "npm install && npm run dev"
    networks:
      - petmarket_network
    depends_on:
      - app

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  petmarket_network:
    driver: bridge
