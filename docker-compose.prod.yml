services:

  # ── Laravel PHP-FPM (production) ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile          # Multi-stage production build
      target: production
    container_name: petmarket_app_prod
    restart: always
    working_dir: /var/www
    env_file: ./src/.env.production
    volumes:
      - app_storage:/var/www/storage/app/public
      - app_logs:/var/www/storage/logs
    networks:
      - petmarket_prod
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx (production) ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: petmarket_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www:ro
      - app_storage:/var/www/storage/app/public:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro     # SSL certs from certbot
      - nginx_logs:/var/log/nginx
    networks:
      - petmarket_prod
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL (production) ───────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: petmarket_postgres_prod
    restart: always
    env_file: ./src/.env.production
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - petmarket_prod
    # NOT exposed on host ports in production — internal only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js Frontend (production) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: petmarket_frontend_prod
    restart: always
    env_file: ./frontend/.env.production
    environment:
      NODE_ENV: production
    networks:
      - petmarket_prod
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_prod_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  petmarket_prod:
    driver: bridge
